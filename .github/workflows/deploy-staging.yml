name: Build & Deploy (staging → travel.bergsten.net)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (SHA + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/docker/Dockerfile
          build-args: |
            APP_ENV=production
            GH_PACKAGES_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Keep the server's compose file in lockstep with the repo (secrets stay in
      # the server-only .env.docker, which this never touches).
      - name: Sync compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: deployment/staging/docker-compose.yml
          target: /srv/staging/apps/travel-companion/
          strip_components: 2

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,SHA
          script: |
            set -euo pipefail

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            cd /srv/staging/apps/travel-companion

            # Pin the exact image this commit built (SHA-pinned deploy → real rollbacks).
            echo "IMAGE_TAG=${SHA}" > .env

            # Retry pull: on the very first deploy the postgres-image workflow may
            # still be pushing travel-postgres:pg18 in parallel.
            for i in 1 2 3 4 5; do
              if docker compose pull; then break; fi
              echo "pull failed (attempt $i), retrying in 20s..."; sleep 20
            done

            # Postgres first, and healthy, before anything talks to it.
            docker compose up -d postgres

            # ---------------------------------------------------------------
            # Migrate BEFORE the new app starts — not after.
            #
            # Horizon autostarts inside the app container (supervisord). If we
            # `up -d` first and migrate second, then for the whole window between
            # container start and migration completing there are workers running
            # NEW code against an OLD schema. A job touching a new column fails
            # into failed_jobs, and nothing surfaces it — the deploy reports
            # success while generations quietly die.
            #
            # A one-off container runs the new image's migrations without
            # disturbing the currently-serving app.
            # ---------------------------------------------------------------
            docker compose run --rm --no-deps app php artisan migrate --force

            # Now swap. Recreating the app container restarts Horizon with the
            # new code — long-running workers never pick up a new binding or job
            # class on their own, so a worker that is not restarted is a worker
            # running last week's code.
            docker compose up -d

            # Belt and braces: if compose decided the app container did not need
            # recreating (identical tag on a re-run), tell Horizon to cycle its
            # workers anyway. Graceful — supervisord's stopsignal=QUIT lets
            # in-flight jobs finish.
            docker compose exec -T app php artisan horizon:terminate || true

            # A queue that fails silently is the whole problem we are fixing, so
            # say so out loud. Not fatal: a pre-existing failure should not block
            # a deploy that might be the fix for it.
            FAILED=$(docker compose exec -T app php artisan queue:failed --json 2>/dev/null | grep -o '"id"' | wc -l | tr -d ' ')
            if [ "${FAILED:-0}" -gt 0 ]; then
              echo "::warning::${FAILED} job(s) in failed_jobs on staging — inspect with 'artisan queue:failed'"
            fi

            docker image prune -f
