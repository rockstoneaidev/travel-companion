name: CI (quality gate)

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Pint + PHPUnit)
    runs-on: ubuntu-latest

    # Tests run against real PostgreSQL + PostGIS + pgvector — SQLite cannot host the
    # geography/vector columns this product is built on. See docs/conventions/11-testing.md.
    services:
      postgres:
        image: ghcr.io/rockstoneaidev/travel-postgres:pg18
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          POSTGRES_DB: travel_companion_test
          POSTGRES_USER: travel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, intl, pdo_pgsql, pgsql, redis, pcntl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Pint (lint, no-fix)
        run: vendor/bin/pint --test

      # phpunit.xml forces DB_DATABASE=travel_companion_test; host/user/password come from .env.example.
      # TODO: once a migration owns `CREATE EXTENSION postgis/vector`, drop this step.
      - name: Enable PostGIS + pgvector in the test database
        env:
          PGPASSWORD: secret
        run: |
          psql -h 127.0.0.1 -U travel -d travel_companion_test \
            -c "CREATE EXTENSION IF NOT EXISTS postgis; CREATE EXTENSION IF NOT EXISTS vector;"

      - name: PHPUnit
        run: php artisan test

  frontend:
    name: Frontend (ESLint + tsc + Prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      # tsconfig maps `ziggy-js` -> vendor/tightenco/ziggy, so type-checking needs
      # the Composer package present (Ziggy is the single source of truth for routes).
      - name: Install Composer deps (for Ziggy types)
        run: composer install --no-dev --no-scripts --no-interaction --prefer-dist --no-progress

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Prettier (check)
        run: npm run format:check

      # The offline feedback queue is the one piece of product logic that lives
      # only in the browser, and the one whose failure mode is silent data loss
      # in a French dead zone (SCREENS S11). It gets a real test runner.
      - name: Vitest
        run: npm run test:js
