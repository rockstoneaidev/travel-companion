name: Build Postgres image (PostGIS + pgvector, PG18)

# The dedicated database image rarely changes, so it is NOT built on every deploy.
# Run manually, or automatically when the postgres Dockerfile changes.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deployment/docker/postgres/**'
      - '.github/workflows/postgres-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/docker/postgres/Dockerfile
          push: true
          tags: |
            ghcr.io/rockstoneaidev/travel-postgres:pg18
            ghcr.io/rockstoneaidev/travel-postgres:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
