# Staging stack — lives at /srv/staging/apps/travel-companion/docker-compose.yml on the
# Hetzner box. Joins the shared Traefik (`web`) and data (`internal`) networks. Reuses
# the shared `staging-redis`; runs its OWN Postgres because the shared one lacks PostGIS.
# IMAGE_TAG is written by CI (commit SHA) into the sibling .env file.
#
# -----------------------------------------------------------------------------
# CONFIG HAS ONE SOURCE: env_file. Do not also bind-mount .env.docker into the
# container. (Fixed 2026-07-14.)
#
# It used to be wired BOTH ways, and the two do not behave the same:
#
#   env_file:  injected as real process environment variables when the container
#              is CREATED, and then frozen for its lifetime.
#   bind-mount live — edit the file and the container sees it immediately.
#
# Laravel's Dotenv will not override a process variable that already exists. So
# the frozen env silently won, and editing .env.docker appeared to do nothing:
# `config:clear` did not help either, because config reads env(), and env() was
# returning the stale process variable.
#
# That cost a real afternoon. Google sign-in bounced everyone back to the login
# screen with nothing in the log, because the container was still running an old
# ALLOWED_REGISTRATION_EMAILS and politely refusing addresses that WERE on the
# list in the file.
#
# The tempting inverse fix — drop env_file, keep the bind-mount — is much worse:
# APP_KEY would no longer be a process variable, so the entrypoint's
# `if [ -z "$APP_KEY" ]` branch would fire and regenerate the key on EVERY boot,
# invalidating every session and making every encrypted column unreadable.
#
# Consequence of the rule: **changing a secret requires recreating the container**
# (`docker compose up -d`), not `restart` and not `config:clear`. The deploy
# workflow already does exactly that.
# -----------------------------------------------------------------------------
services:
  app:
    image: ghcr.io/rockstoneaidev/travel-companion:${IMAGE_TAG:-latest}
    container_name: travel-companion-app
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web
      - internal
    # -------------------------------------------------------------------------
    # Readiness, so "the container is running" stops being mistaken for "the app
    # is serving".
    # -------------------------------------------------------------------------
    # `/up` is Laravel's health route (bootstrap/app.php). PHP-FPM and nginx come
    # up in well under a second, but the entrypoint runs `optimize:clear` and boots
    # supervisord first, and for that handful of seconds the port is open to nobody.
    #
    # The deploy waits on THIS (`up -d --wait`), so a container that comes up broken
    # fails the deploy instead of quietly serving 502s until someone notices.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12          # 60s to become healthy: generous, and still fails a real breakage
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.travel-companion.rule=Host(`travel.bergsten.net`)"
      - "traefik.http.routers.travel-companion.entrypoints=websecure"
      - "traefik.http.routers.travel-companion.tls=true"
      - "traefik.http.routers.travel-companion.tls.certresolver=le"
      - "traefik.http.services.travel-companion.loadbalancer.server.port=80"

      # -----------------------------------------------------------------------
      # THE DEPLOY WINDOW, and why this is a retry rather than a second container.
      # -----------------------------------------------------------------------
      # `docker compose up -d` STOPS the old container and STARTS the new one. For
      # the few seconds in between there is no backend at all, and Traefik answers
      # the only way it can: 502 Bad Gateway. Reload during a deploy — which is
      # exactly when someone is watching — and that is what you get.
      #
      # The textbook fix is to run the new container alongside the old and swap once
      # it is healthy. We deliberately do NOT: Horizon lives inside this container,
      # so a second app is a second Horizon plus a second PHP-FPM pool, and this box
      # has ~570 MB free and is shared with other apps. Trading a five-second blip
      # for an OOM kill is not a trade.
      #
      # So the gap is CLOSED FROM THE OTHER END. Traefik's retry fires on a
      # connection error — no response was ever received, so replaying the request is
      # safe even for a POST — and backs off across the window: 0.5s, 1s, 2s, 4s.
      # The new container answers inside that, and the request that would have been a
      # 502 simply takes a moment longer. The user sees a slow page, not a broken one.
      - "traefik.http.middlewares.travel-companion-retry.retry.attempts=5"
      - "traefik.http.middlewares.travel-companion-retry.retry.initialInterval=500ms"
      - "traefik.http.routers.travel-companion.middlewares=travel-companion-retry"
      # HTTP -> HTTPS redirect (app-scoped middleware to avoid clashing with other apps)
      - "traefik.http.routers.travel-companion-http.rule=Host(`travel.bergsten.net`)"
      - "traefik.http.routers.travel-companion-http.entrypoints=web"
      - "traefik.http.routers.travel-companion-http.middlewares=travel-companion-https"
      - "traefik.http.middlewares.travel-companion-https.redirectscheme.scheme=https"

  scheduler:
    image: ghcr.io/rockstoneaidev/travel-companion:${IMAGE_TAG:-latest}
    container_name: travel-companion-scheduler
    restart: unless-stopped
    # env_file only — see the note at the top of this file.
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    command: ["sh", "-lc", "php artisan schedule:work --verbose --no-interaction"]

  postgres:
    image: ghcr.io/rockstoneaidev/travel-postgres:pg18
    container_name: travel-postgres
    restart: unless-stopped
    # POSTGRES_DB/USER/PASSWORD live in .env.docker alongside the app's DB_* vars.
    env_file:
      - .env.docker
    volumes:
      # PG18 images require the mount at /var/lib/postgresql (data lands in a
      # version subdir); the old /var/lib/postgresql/data path makes 18 refuse to boot.
      - travel-postgres:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "${POSTGRES_USER:-travel}" -d "${POSTGRES_DB:-travel_companion}"']
      retries: 5
      timeout: 5s
    networks:
      - internal

volumes:
  travel-postgres:
    driver: local

networks:
  web:
    external: true
  internal:
    external: true
